<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Fried Bananas · Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== DFB BRAND SYSTEM (locked) ===== */
  :root {
    --y:        #FFE066;     /* soft banana yellow */
    --y-deep:   #FFD93D;     /* original brighter — used sparingly for highlights */
    --p:        #FFA8C9;     /* soft pink */
    --p-deep:   #E66499;     /* deeper pink for text on cream */
    --p-soft:   #FFE6F0;     /* pink-tint background */
    --cream:    #FFF8E7;     /* primary background, paper, sky */
    --cream-w:  #F5EDD0;     /* utility only — web chrome, NOT illustration */
    --ink:      #1F1A17;     /* warm dark — outlines, primary text */
    --ink-soft: #4D4D4D;
    --ink-mute: #808080;
    --line:     rgba(31,26,23,0.1);
    --line-bold: rgba(31,26,23,0.22);

    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --hand: 'Caveat', cursive;
    --body: 'Inter Tight', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--body);
    background: var(--cream);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ============================================================
     LAYOUT — sidebar + main
     ============================================================ */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    background: var(--ink);
    color: var(--cream);
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,248,231,0.15);
    cursor: pointer;
    transition: opacity 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .sidebar-brand:visited,
  .sidebar-brand:hover,
  .sidebar-brand:active { text-decoration: none; color: inherit; }
  .sidebar-brand:hover { opacity: 0.85; }
  .sidebar-brand-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--y);
    border: 2px solid var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    color: var(--ink);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .sidebar-brand-text {
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    color: var(--y);
    line-height: 1.1;
    letter-spacing: -0.012em;
  }
  .sidebar-brand-sub {
    font-size: 10px;
    color: rgba(255,248,231,0.55);
    margin-top: 2px;
    line-height: 1;
  }

  .sidebar-label {
    font-family: var(--display);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,248,231,0.4);
    padding: 14px 8px 6px;
  }
  .nav-item {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 11px;
    align-items: center;
    padding: 9px 10px;
    border-radius: 9px;
    font-size: 13px;
    color: rgba(255,248,231,0.78);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--body);
    font-weight: 500;
    text-decoration: none;
    user-select: none;
  }
  .nav-item:hover {
    background: rgba(255,224,102,0.1);
    color: var(--y);
  }
  .nav-item.active {
    background: var(--y);
    color: var(--ink);
    font-weight: 600;
  }
  .nav-item svg { width: 18px; height: 18px; }
  .nav-item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--p);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .nav-item-dot.touched { opacity: 1; }

  /* ============================================================
     MAIN
     ============================================================ */
  .main {
    padding: 32px 40px 60px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Greeting row above the scene */
  .greeting-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  .greeting {
    font-family: var(--hand);
    font-size: 38px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
  }
  .greeting-sub {
    font-family: var(--body);
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .pill {
    background: var(--p);
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: var(--body);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .pill:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 0 var(--ink);
  }
  .pill-dot {
    width: 7px; height: 7px;
    background: var(--ink);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  /* ============================================================
     THE SCENE
     ============================================================ */
  .scene-card {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 8px 8px 0 0 var(--p);
    position: relative;
  }

  /* HOTSPOT — completely invisible. Only the label shows on hover. */
  .hotspot {
    position: absolute;
    cursor: pointer;
    z-index: 5;
    background: transparent;
    border: none;
    transition: transform 0.18s ease;
  }
  .hotspot:active {
    transform: scale(0.985);
  }
  /* Z-index ordering so overlapping smaller hotspots win clicks */
  .hotspot[data-route="/storefront"] { z-index: 4; }
  .hotspot[data-route="/recipes"]    { z-index: 6; }
  .hotspot[data-route="/merch"]      { z-index: 6; }
  .hotspot[data-route="/money"]      { z-index: 6; }

  /* Label tooltip — the only visible hover feedback */
  .hotspot:hover .hotspot-label {
    opacity: 1;
    transform: translate(-50%, -110%) scale(1);
  }
  .hotspot-label {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translate(-50%, -90%) scale(0.92);
    background: var(--ink);
    color: var(--y);
    padding: 7px 14px;
    border-radius: 999px;
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: -0.01em;
    box-shadow: 0 3px 0 0 var(--p-deep);
    z-index: 10;
  }
  .hotspot-label::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: var(--ink);
  }

  /* Optional debug mode — shows hotspot bounds (developer tool, defaults off) */
  body.debug-hotspots .hotspot {
    background: rgba(255,168,201,0.18);
    outline: 2px dashed var(--p-deep);
    outline-offset: -2px;
  }
  body.debug-hotspots .hotspot::before {
    content: attr(data-debug);
    position: absolute;
    top: 4px;
    left: 8px;
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    color: var(--p-deep);
    background: var(--cream);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1.5px solid var(--p-deep);
    pointer-events: none;
    z-index: 20;
  }

  /* Footer below scene */
  .scene-footer {
    background: var(--cream-w);
    border-top: 3px solid var(--ink);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .scene-tip {
    font-family: var(--hand);
    font-size: 22px;
    color: var(--p-deep);
    font-weight: 600;
  }
  .scene-tip-sub {
    font-family: var(--body);
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: 8px;
  }
  .scene-key {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: var(--ink-mute);
    font-family: var(--body);
  }
  .debug-toggle {
    background: transparent;
    border: 1.5px solid var(--ink-mute);
    color: var(--ink-mute);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10.5px;
    font-family: var(--body);
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .debug-toggle:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .debug-toggle.on {
    background: var(--p);
    color: var(--ink);
    border-color: var(--ink);
  }

  /* ============================================================
     WORKSPACE MODAL — opens over the stand
     ============================================================ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(31, 26, 23, 0.55);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    opacity: 0;
    animation: backdrop-in 0.22s ease forwards;
  }
  @keyframes backdrop-in {
    to { opacity: 1; }
  }
  .modal-card {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 22px;
    box-shadow: 10px 10px 0 0 var(--p);
    width: 100%;
    max-width: 920px;
    max-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transform: translateY(20px) scale(0.97);
    opacity: 0;
    animation: modal-in 0.28s cubic-bezier(0.34, 1.4, 0.64, 1) 0.05s forwards;
  }
  @keyframes modal-in {
    to {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }
  .modal-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--cream);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    font-family: var(--body);
    font-size: 18px;
    line-height: 1;
    font-weight: 600;
    transition: all 0.15s;
    padding: 0;
  }
  .modal-close:hover {
    background: var(--p);
    transform: rotate(90deg);
  }
  .modal-close svg {
    width: 16px;
    height: 16px;
  }

  /* Modal header — yellow banner with workspace name */
  .ws-header {
    background: var(--y);
    padding: 36px 56px 28px 40px;
    border-bottom: 3px solid var(--ink);
    flex-shrink: 0;
    position: relative;
  }
  .ws-header-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--y);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .ws-header h1 {
    font-family: var(--display);
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.025em;
    margin-bottom: 10px;
  }
  .ws-header h1 em {
    font-style: normal;
    background: var(--p);
    border: 3px solid var(--ink);
    padding: 0 10px;
    border-radius: 8px;
    line-height: 1.05;
  }
  .ws-header p {
    font-size: 16px;
    color: var(--ink);
    opacity: 0.85;
    max-width: 600px;
    line-height: 1.5;
  }

  /* Modal scrollable body */
  .ws-body {
    background: white;
    padding: 36px 40px;
    overflow-y: auto;
    flex: 1;
  }
  .ws-body h2 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.018em;
  }
  .ws-body p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .ws-body p strong {
    background: var(--y);
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
  }
  .ws-coming-soon {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--p-soft);
    border: 2px solid var(--ink);
    padding: 10px 16px;
    border-radius: 12px;
    margin-top: 16px;
    font-family: var(--hand);
    font-size: 18px;
    color: var(--p-deep);
    font-weight: 600;
  }

  /* Modal responsive */
  @media (max-width: 720px) {
    .modal-backdrop {
      padding: 0;
      align-items: stretch;
    }
    .modal-card {
      max-height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    .ws-header { padding: 28px 56px 22px 22px; }
    .ws-body { padding: 24px 22px; }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative;
      height: auto;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 4px;
      padding: 14px 16px;
    }
    .sidebar-brand {
      width: 100%;
      margin-bottom: 12px;
      padding-bottom: 12px;
    }
    .sidebar-label { display: none; }
    .nav-item {
      grid-template-columns: 18px auto auto;
      padding: 7px 11px;
      font-size: 12px;
    }
    .main { padding: 22px 18px 40px; }
    .greeting { font-size: 30px; }
    .scene-card { box-shadow: 4px 4px 0 0 var(--p); }
    .hotspot-label { font-size: 11px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============================================================
       MAIN

<script>
  // ============================================================
  // STATE — localStorage
  // ============================================================
  const STORAGE_KEY = 'dfb_workspace_v1';
  const state = {
    name: 'Seth',
    touched: {},  // tracks which workspaces user has visited
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        Object.assign(state, parsed);
      }
    } catch (e) {}
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {}
  }

  // ============================================================
  // ROUTES — definitions for each workspace
  // ============================================================
  const ROUTES = {
    '/':           { name: 'Home',              type: 'home' },
    '/menu':       { name: 'Menu & pricing',    intro: "What you sell, what you charge, what actually makes money.", what: "We'll look at your current menu, figure out which items are doing the heavy lifting, and reprice the ones that aren't. The goal isn't a bigger menu. It's a sharper one." },
    '/brand':      { name: 'Brand & signage',   intro: "What your shop looks like, sounds like, and feels like.", what: "Your logo, colors, type, and the story your storefront tells. Done well, this is what gets a stranger to walk in." },
    '/money':      { name: 'Money',             intro: "Where the money goes — and where it could stay.", what: "Build a real picture of your shop's profit and loss. Find the leaks. Plan the wins. The math is simpler than anyone made it seem." },
    '/customers':  { name: 'Loyal customers',  intro: "The regulars. The hat-wearers. The case studies waiting to happen.", what: "Find your repeat customers. Turn them into evangelists. Build a loyalty system that actually works for a small shop." },
    '/storefront': { name: 'Storefront',        intro: "The space, the signage, the first impression.", what: "From awning to sidewalk. What works, what to fix, and how to make it photographable." },
    '/marketing':  { name: 'Marketing',         intro: "Telling people you exist (without spending a fortune).", what: "Social posts, content rhythm, community partnerships. The stuff that actually moves the needle for a small shop." },
    '/equipment':  { name: 'Equipment',         intro: "The gear that keeps you open.", what: "What you have, what you need, what's worth upgrading. Inventory of tools, schedules for maintenance, vendor list." },
    '/merch':      { name: 'Product & merch',   intro: "What else you sell besides the food.", what: "Hats, mugs, totes, branded gear. The stuff your loyal customers want to wear. A second revenue stream and a walking marketing channel rolled into one." },
    '/recipes':    { name: 'Checklists & SOPs', intro: "All the stuff that probably lives in your head right now.", what: "Open/close checklists, recipes, prep lists, the steps you walk a new hire through. Write it down once. Stop having to be the only one who knows how. (This is what people mean when they say SOPs — Standard Operating Procedures. Same thing. Less scary word.)" },
    '/supply':     { name: 'Supply & inventory',intro: "What you've got, what you're running out of, what costs too much.", what: "Track inventory. Manage vendors. Find COGS leaks. The boring work that decides whether you keep the lights on." },
    '/calls':      { name: 'Calls',             intro: "When we meet, what we talk about, who shows up.", what: "Three live calls a week. Drop in for the ones that matter. Skip the rest. No pressure." }
  };

  // ============================================================
  // HOTSPOTS — banana stand scene
  // Each percentage refers to the 1672×941 background image.
  // ============================================================
  const HOTSPOTS = [
    { route: '/brand',      label: 'Brand & signage',     left: 19,  top: 18,  width: 13, height: 25 },
    { route: '/storefront', label: 'Storefront',          left: 43,  top: 1,   width: 44, height: 22 },
    { route: '/menu',       label: 'Menu & pricing',      left: 70,  top: 30,  width: 14, height: 22 },
    { route: '/recipes',    label: 'Checklists & SOPs',   left: 64,  top: 31,  width: 6,  height: 17 },
    { route: '/merch',      label: 'Product & merch',     left: 43,  top: 31,  width: 13, height: 17 },
    { route: '/equipment',  label: 'Equipment',           left: 36,  top: 47,  width: 14, height: 23 },
    { route: '/money',      label: 'Money',               left: 50,  top: 55,  width: 11, height: 17 },
    { route: '/customers',  label: 'Loyal customers',     left: 71,  top: 49,  width: 29, height: 49 },
    { route: '/marketing',  label: 'Marketing',           left: 6,   top: 69,  width: 13, height: 28 }
  ];

  // ============================================================
  // RENDER
  // ============================================================
  const main = document.getElementById('main');

  function render() {
    const path = (location.hash || '#/').replace(/^#/, '') || '/';
    const route = ROUTES[path] || ROUTES['/'];

    // Update active nav
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === path);
    });

    // Update touched dots
    document.querySelectorAll('.nav-item').forEach(el => {
      const r = el.dataset.route;
      const dot = el.querySelector('.nav-item-dot');
      if (dot && state.touched[r]) dot.classList.add('touched');
    });

    // Mark touched (except home)
    if (path !== '/') {
      state.touched[path] = true;
      saveState();
    }

    // Home is ALWAYS rendered. Modal overlays it for non-home routes.
    const isModal = route.type !== 'home';
    main.innerHTML = renderHome() + (isModal ? renderModal(route, path) : '');
    wireHotspots();
    if (isModal) wireModal();

    // Lock body scroll while modal is open
    document.body.style.overflow = isModal ? 'hidden' : '';
  }

  function renderHome() {
    const hotspotHtml = HOTSPOTS.map(h => `
      <div class="hotspot" data-route="${h.route}" data-debug="${h.label}" style="left:${h.left}%; top:${h.top}%; width:${h.width}%; height:${h.height}%;">
        <span class="hotspot-label">${h.label}</span>
      </div>
    `).join('');

    return `
      <div class="greeting-row">
        <div>
          <div class="greeting-sub">Tap anything in the stand to get started. Or use the menu →</div>
        </div>
        <button class="pill" onclick="location.hash='#/calls'">
          <span class="pill-dot"></span>
          Next call: Mon · 10am ET
        </button>
      </div>

      <div class="scene-card">
        <div class="scene-wrap" id="scene-wrap">
          ${hotspotHtml}
        </div>
        <div class="scene-footer">
          <div>
            <span class="scene-tip">tap anywhere on the stand to begin</span>
            <span class="scene-tip-sub">or use the menu →</span>
          </div>
          <div style="display:inline-flex; align-items:center; gap:14px;">
            <div class="scene-key">9 clickable areas · hover to discover</div>
            <button class="debug-toggle" id="debug-toggle" onclick="toggleDebug()">show hotspots</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderModal(route, path) {
    return `
      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-card" role="dialog" aria-modal="true" aria-label="${route.name}">
          <button class="modal-close" id="modal-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="ws-header">
            <div class="ws-header-eyebrow">
              <span style="width:6px;height:6px;border-radius:50%;background:var(--y);"></span>
              Workspace
            </div>
            <h1>${escapeBreak(route.name)}</h1>
            <p>${route.intro}</p>
          </div>
          <div class="ws-body">
            <h2>What we'll do here</h2>
            <p>${route.what}</p>
            <p>This workspace is being built. The next session will turn it into a real illustrated walkthrough — scrollable, with prompts, with mini-tools, and with output that becomes a chapter of your shop's playbook.</p>
            <div class="ws-coming-soon">
              <span>🍌</span>
              <span>being built right now — come back soon</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function closeModal() {
    location.hash = '#/';
  }

  function wireModal() {
    const backdrop = document.getElementById('modal-backdrop');
    const closeBtn = document.getElementById('modal-close');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) {
      backdrop.addEventListener('click', (e) => {
        // Only close if clicking the backdrop itself, not the card inside it
        if (e.target === backdrop) closeModal();
      });
    }
    // Escape key closes modal (one listener, replaced each open)
    document.removeEventListener('keydown', escHandler);
    document.addEventListener('keydown', escHandler);
  }
  function escHandler(e) {
    if (e.key === 'Escape') closeModal();
  }

  function escapeBreak(s) {
    const parts = s.split(' ');
    if (parts.length < 2) return `<em>${s}</em>`;
    const last = parts.pop();
    return `${parts.join(' ')} <em>${last}</em>`;
  }

  function wireHotspots() {
    document.querySelectorAll('.hotspot').forEach(el => {
      el.addEventListener('click', () => {
        location.hash = '#' + el.dataset.route;
      });
    });
  }

  function getTimeGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'good morning';
    if (h < 18) return 'hey there';
    return 'good evening';
  }

  function toggleDebug() {
    document.body.classList.toggle('debug-hotspots');
    const btn = document.getElementById('debug-toggle');
    if (btn) {
      const on = document.body.classList.contains('debug-hotspots');
      btn.classList.toggle('on', on);
      btn.textContent = on ? 'hide hotspots' : 'show hotspots';
    }
  }

  // ============================================================
  // INIT
  // ============================================================
  loadState();
  window.addEventListener('hashchange', render);
  render();

  // Wire sidebar nav (already uses href="#/route" so hashchange handles it)
</script>

</body>
</html>
