const startOfWeek = d => {
  const r = new Date(d);
  r.setHours(0, 0, 0, 0);
  r.setDate(r.getDate() - r.getDay());
  return r;
};
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const startOfYear = d => new Date(d.getFullYear(), 0, 1);
const endOfWeek = d => {
  const r = startOfWeek(d);
  r.setDate(r.getDate() + 7);
  return r;
};
const endOfMonth = d => new Date(d.getFullYear(), d.getMonth() + 1, 1);
const endOfYear = d => new Date(d.getFullYear() + 1, 0, 1);
const VIEWS = {
  week: {
    label: 'Week',
    start: startOfWeek,
    end: endOfWeek,
    step: (d, dir) => {
      const r = new Date(d);
      r.setDate(r.getDate() + dir * 7);
      return r;
    }
  },
  month: {
    label: 'Month',
    start: startOfMonth,
    end: endOfMonth,
    step: (d, dir) => {

const fmtRange = (view, anchor) => {
  const s = VIEWS[view].start(anchor),
    e = new Date(VIEWS[view].end(anchor).getTime() - 1);
  if (view === 'year') return s.getFullYear().toString();
  if (view === 'month') return s.toLocaleDateString('en-US', {
    month: 'long',
    year: 'numeric'
  });
  return "".concat(s.toLocaleDateString('en-US', {
    month: 'short',
    day: 'numeric'
  }), " \u2013 ").concat(e.toLocaleDateString('en-US', {
    month: 'short',
    day: 'numeric'

};

// Stable per-dot random — same dot always lands in same spot
const seededRand = (seed, salt) => {
  const x = Math.sin((seed.charCodeAt(0) || 0) + (seed.charCodeAt(seed.length - 1) || 0) + salt * 9999) * 10000;
  return x - Math.floor(x);
};
