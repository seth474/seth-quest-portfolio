function gDFB() { const a = []; for (let m = 0; m < H; m++) { let mem; if (m < 6) mem = 0; else if (m < 12) mem = Math.min((m - 5) * 10, 50); else if (m < 24) mem = Math.round(60 + (200 - 60) * ((m - 12) / 11)); else mem = Math.round(210 + (300 - 210) * ((m - 24) / 11)); a.push(mem * 100); } return a; }
function gCarbon() { const net = 25000, p = Array(H).fill(0); p[6] = 1;[15, 19, 23].forEach((i) => p[i] = 1);[24, 26, 28, 29, 30, 31, 32, 33, 34, 35].forEach((i) => p[i] = 1); return p.map((x) => x * net); }

    <div style={{ display: "grid", gap: 12 }}>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          {tags.map((t) => <button key={t} onClick={() => setD({ ...d, tag: t })} style={chip(d.tag === t, tc(t))}>{t}</button>)}
          <button onClick={add} style={{ ...mBtn(CYAN), marginLeft: "auto" }}>LOG IT</button>
        </div>
      </div>
      {s.log.map((e) => (
        <div key={e.id} style={{ borderLeft: `3px solid ${tc(e.tag)}`, background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "10px 12px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ ...lbl, color: tc(e.tag) }}>{e.tag} · {fmt(e.date)}</span>
            <button onClick={() => del(e.id)} style={{ background: "none", border: "none", color: MUT, cursor: "pointer" }}>✕</button>

          <div style={{ fontWeight: 600, fontSize: 14, marginTop: 5 }}>{e.title}</div>
          {e.note && <div style={{ fontSize: 12.5, color: MUT, marginTop: 4, lineHeight: 1.5 }}>{e.note}</div>}
        </div>
      ))}
    </div>
  );
}
function DutiesModal({ s, up }) {
  const cyc = { "Not filed": "Filed", "Filed": "Resolved", "Resolved": "Not filed" };
  const tc = (st) => st === "Resolved" ? GOOD : st === "Filed" ? GOLD : BAD;
  const [ny, setNy] = useState("");
  const cycle = (id) => up((p) => ({ ...p, taxYears: p.taxYears.map((y) => y.id === id ? { ...y, status: cyc[y.status] } : y) }));
  const setOwed = (id, v) => up((p) => ({ ...p, taxYears: p.taxYears.map((y) => y.id === id ? { ...y, owed: parseInt(v || 0, 10) || 0 } : y) }));
  const del = (id) => up((p) => ({ ...p, taxYears: p.taxYears.filter((y) => y.id !== id) }));
  const addY = () => { if (!ny.trim()) return; up((p) => ({ ...p, taxYears: [...p.taxYears, { id: "y" + Date.now(), year: ny.trim(), status: "Not filed", owed: 0 }] })); setNy(""); };
  const step = (id) => up((p) => ({ ...p, taxSteps: p.taxSteps.map((x) => x.id === id ? { ...x, done: !x.done } : x) }));
  return (
    <div style={{ display: "grid", gap: 12 }}>
      <div style={{ fontSize: 12.5, color: MUT, lineHeight: 1.6 }}>Your standing with the IRS. At low income this is usually small — withheld pay may mean refunds (file the oldest year first; the window closes ~3 yrs out). SE tax on 1099 work is the only real bill.</div>
      {s.taxYears.map((y) => (
        <div key={y.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, border: `1px solid ${EDGE}`, borderRadius: 9, padding: "9px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 16, fontWeight: 700 }}>{y.year}</span><button onClick={() => cycle(y.id)} style={chip(true, tc(y.status))}>{y.status}</button></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ color: MUT, fontSize: 11 }}>owed $</span><input className="oc-num" style={{ width: 68 }} value={y.owed} inputMode="numeric" onChange={(e) => setOwed(y.id, e.target.value.replace(/\D/g, ""))} /><button onClick={() => del(y.id)} style={{ background: "none", border: "none", color: MUT, cursor: "pointer" }}>✕</button></div>
        </div>
      ))}
      <div style={{ display: "flex", gap: 6 }}><input className="oc-in" placeholder="add a year e.g. 2021" value={ny} onChange={(e) => setNy(e.target.value)} /><button onClick={addY} style={mBtn(MUT)}>+ YEAR</button></div>
      <div style={{ ...lbl, marginTop: 4 }}>steps to good standing</div>
      {s.taxSteps.map((x) => <Check key={x.id} done={x.done} label={x.t} onClick={() => step(x.id)} />)}
      <div style={{ ...lbl, marginTop: 4 }}>notes</div>
      <textarea className="oc-in" rows={4} placeholder="e.g. pull free Wage & Income transcripts at irs.gov (10 yrs available) to see what's reported under your SSN before filing. File the most recent years first, oldest unfiled year first to protect refunds. Confirm any residency / foreign-income questions with a CPA." value={s.taxNotes || ""} onChange={(e) => up({ ...s, taxNotes: e.target.value })} />
    </div>
  );
}
function CreditModal({ s, up }) {
  const [v, setV] = useState("");
  const data = s.scores.map((x) => ({ ...x, label: fmt(x.date) }));
  const add = () => { const n = parseInt(v, 10); if (!n || n < 300 || n > 850) return; up((p) => ({ ...p, scores: [...p.scores, { date: todayISO(), score: n }].sort((a, b) => a.date.localeCompare(b.date)) })); setV(""); };
  return (
    <div style={{ display: "grid", gap: 12 }}>
      <div style={{ display: "flex", gap: 6 }}><input className="oc-in" placeholder="log score e.g. 540" value={v} inputMode="numeric" onChange={(e) => setV(e.target.value.replace(/\D/g, ""))} onKeyDown={(e) => e.key === "Enter" && add()} /><button onClick={add} style={mBtn(CYAN)}>LOG</button></div>
      {data.length > 0 && (
        <div style={{ height: 170 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={data} margin={{ top: 6, right: 6, left: -16, bottom: 0 }}>
              <CartesianGrid stroke="rgba(120,180,210,0.08)" vertical={false} />
              <XAxis dataKey="label" tick={{ fontSize: 10, fill: MUT }} stroke={EDGE} />
              <YAxis domain={[300, 850]} ticks={[300, 580, 670, 740]} tick={{ fontSize: 10, fill: MUT }} stroke={EDGE} />
              <Tooltip contentStyle={{ background: BG1, border: `1px solid ${EDGE}`, borderRadius: 8, fontSize: 12 }} />
              <ReferenceLine y={700} stroke={GOLD} strokeDasharray="4 4" />

            </LineChart>
          </ResponsiveContainer>
        </div>
      )}
      <div style={lbl}>derogatory items</div>
      {s.repos.map((r) => { const fo = addYears(r.first, 7); const past = fo < todayISO(); return (
        <div key={r.id} style={{ borderLeft: `3px solid ${r.err ? BAD : MUT}`, background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "9px 12px" }}>
          <div style={{ fontWeight: 600, fontSize: 13.5 }}>{r.name} <span style={{ color: MUT, fontWeight: 400 }}>· repossession</span></div>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 11, marginTop: 4, color: past ? GOOD : GOLD }}>{past ? "should be OFF report" : "falls off " + fmt(fo)}</div>
          <div style={{ fontSize: 12, color: MUT, marginTop: 4, lineHeight: 1.45 }}>{r.note}</div>
        </div>
      ); })}
    </div>
  );
}
function Check({ done, label, onClick }) {
  return (
    <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", textAlign: "left", background: done ? "rgba(57,224,176,0.08)" : "rgba(0,0,0,0.2)", border: `1px solid ${done ? GOOD + "55" : EDGE}`, borderRadius: 9, padding: "9px 11px", cursor: "pointer", fontFamily: "'Chakra Petch',sans-serif" }}>

const FREEDOM = [

  { name: "The Cabin", min: 75000, price: "$50–75k", note: "Trade the lease for a deed — a cheap piece of land and a rustic cabin that's yours outright. A quiet base to think and build, and somewhere to park the rig." },

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }} className="oc-fleet">
        {FREEDOM.map((v, i) => { const unlocked = earned >= v.min, isCur = i === cur, isGoal = i === goalIdx; return (
          <div key={v.name} style={{ position: "relative", border: `1px solid ${isCur ? CYAN : isGoal ? GOLD : EDGE}`, borderRadius: 11, padding: "12px 12px 11px", opacity: unlocked ? 1 : 0.55, background: isCur ? "rgba(56,225,208,0.07)" : "transparent" }}>

            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10.5, color: unlocked ? CYAN : MUT, marginTop: 2 }}>{v.price}{unlocked ? " · ✓ in reach" : ""}</div>
            <div style={{ fontSize: 11.5, color: MUT, lineHeight: 1.5, marginTop: 6 }}>{v.note}</div>
